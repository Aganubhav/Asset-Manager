<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student OS - Dashboard</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <div class="layout">
    <main class="main-content">
      <div class="header">
        <div>
          <h1>Dashboard</h1>
          <p style="color:var(--text-muted); margin:4px 0 0 0;" id="date-display"></p>
        </div>
        <div id="quick-actions" style="display:flex; gap:10px;"></div>
      </div>

      <!-- Productivity Score + Today's Progress -->
      <div style="display:grid; grid-template-columns: 1fr 2fr; gap:20px; margin-bottom:24px;">
        <div class="glass-card" style="padding:24px; text-align:center;" id="score-card"></div>
        <div class="glass-card" style="padding:24px;" id="today-progress"></div>
      </div>

      <!-- Stat Cards -->
      <div class="card-grid" style="margin-bottom:24px;" id="dashboard-stats"></div>

      <!-- Weekly Overview -->
      <div class="glass-card" style="padding:24px; margin-bottom:24px;">
        <h2 style="margin:0 0 20px 0">Weekly Overview</h2>
        <div class="week-grid" id="week-grid"></div>
      </div>

      <!-- Monthly Stats + Recent Activity -->
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
        <div class="glass-card" style="padding:24px;" id="monthly-stats"></div>
        <div class="glass-card" style="padding:24px;" id="recent-activity"></div>
      </div>

      <!-- Motivational Quote -->
      <div class="glass-card" style="padding:20px; margin-top:20px; cursor:pointer;" id="quote-widget" onclick="refreshQuote()">
        <div style="font-size:0.8rem; color:var(--text-muted); margin-bottom:8px;">💡 Daily Inspiration (click to refresh)</div>
        <div id="quote-text" style="font-style:italic; color:var(--text-secondary);"></div>
      </div>
    </main>
  </div>
  <script src="./js/app.js"></script>
  <script type="module" src="./js/dashboard.js"></script>
</body>
</html>
