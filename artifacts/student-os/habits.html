<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student OS - Habits</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <div class="layout">
    <main class="main-content">
      <div class="header">
        <h1>Habits</h1>
        <div style="display:flex; gap:10px; align-items:center;">
          <div class="view-toggle">
            <button class="view-toggle-btn active" id="view-daily" onclick="setHabitView('daily')">Daily</button>
            <button class="view-toggle-btn" id="view-weekly" onclick="setHabitView('weekly')">Weekly</button>
            <button class="view-toggle-btn" id="view-monthly" onclick="setHabitView('monthly')">Monthly</button>
          </div>
          <button class="btn" id="btn-add-habit">+ Add Habit</button>
        </div>
      </div>
      <!-- Today's summary -->
      <div class="glass-card" style="padding:20px; margin-bottom:24px;" id="habits-summary"></div>
      <!-- Habits grid -->
      <div id="habits-container"></div>
    </main>
  </div>
  <!-- Add Habit Modal -->
  <div class="modal-backdrop" id="habit-modal">
    <div class="modal" style="max-width:420px; width:90%;">
      <h2 style="margin:0 0 20px 0;">New Habit</h2>
      <div class="form-group"><label>Habit Name *</label><input type="text" id="h-name" placeholder="e.g. Morning Coding"></div>
      <div class="form-group"><label>Icon</label>
        <div id="icon-picker" style="display:flex; gap:8px; flex-wrap:wrap; margin-top:8px;"></div>
        <input type="hidden" id="h-icon" value="💻">
      </div>
      <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:20px;">
        <button class="btn" style="background:var(--bg-tertiary); color:var(--text-primary);" onclick="closeHabitModal()">Cancel</button>
        <button class="btn" id="btn-save-habit">Add Habit</button>
      </div>
    </div>
  </div>
  <script src="./js/app.js"></script>
  <script type="module" src="./js/habits.js"></script>
</body>
</html>
