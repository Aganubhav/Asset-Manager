kind = "web"
previewPath = "/"
title = "Student Productivity OS"
version = "1.0.0"
id = "artifacts/student-os"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20935

[services.development]
run = "pnpm --filter @workspace/student-os run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/student-os", "run", "build" ]
publicDir = "artifacts/student-os/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20935"
BASE_PATH = "/"
